train_dataset:
  args:
    data_path: 'xxx'
  batch_size: 2

test_dataset:
  args:
    data_path: 'xxx'
  batch_size: 1

denoiser:
  name: songunet
  args:
    img_resolution: 256
    in_channels: 2
    out_channels: 1
    label_dim: 6
    channel_mult_noise: 1
    resample_filter: [1, 1]
    model_channels: 128
    channel_mult: [1, 2, 2, 2]

degradation:
  name: nbnet
  args:
    in_chn: 1
    wf: 32
    depth: 5
    relu_slope: 0.2
    subspace_dim: 16
  args_netd:
    in_ch: 1
    hidden_ch: 64
    n_layers: 3

baseline:
  name: norm_unet_s
  alpha_l1: 0.9
  norm_unet_l_args:
    chans: 128
    num_pools: 4
  norm_unet_s_args:
    chans: 32
    num_pools: 4
  vit_l_args:
    avrg_img_size: 320
    patch_size: (10,10)
    in_chans: 1
    embed_dim: 64
    depth: 10
    num_heads: 16

reddiff:
  args:
    betas: (1e-4, 0.02)
    n_T: 1000
    device: 'cpu'
    drop_prob: 0.1

optimizer:
  name: adam
  args:
    lr: 1.e-5
epoch_start: 1
epoch_max: 50
multi_step_lr:
  milestones: [100, 200, 300, 400]
  gamma: 0.5

epoch_val: 1
epoch_save: 2
lambda_f: 2
device: 'cuda'
save_path: '.'